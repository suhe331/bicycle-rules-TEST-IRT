<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Poc ドリルモード</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2da;
    --text: #1a1a18;
    --muted: #7a7870;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --correct: #16a34a;
    --correct-light: #f0fdf4;
    --wrong: #dc2626;
    --wrong-light: #fef2f2;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'BIZ UDPGothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }

  /* ヘッダー */
  .header {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .session-info { font-size: 13px; color: var(--muted); }

  /* フィルター */
  .filter-bar {
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  select {
    flex: 1;
    min-width: 140px;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    appearance: none;
    cursor: pointer;
  }
  .btn-start {
    font-size: 14px;
    font-weight: 600;
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-start:hover { background: #1d4ed8; }

  /* 進捗バー */
  .progress-wrap {
    width: 100%;
    max-width: 640px;
    margin-bottom: 1.25rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* 問題カード */
  .card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .q-num { font-size: 12px; color: var(--muted); font-weight: 600; }
  .cat-badge {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 20px;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
    margin-left: auto;
  }
  .diff-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--border);
    color: var(--muted);
  }
  .card-body { padding: 1.25rem; }
  .q-text {
    font-size: 16px;
    line-height: 1.75;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }
  .note {
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    margin-bottom: 0.75rem;
    line-height: 1.6;
  }

  /* 選択肢 */
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    width: 100%;
    text-align: left;
    font-size: 14px;
    line-height: 1.6;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct {
    border-color: var(--correct);
    background: var(--correct-light);
    color: var(--correct);
  }
  .choice-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-light);
    color: var(--wrong);
  }
  .choice-label {
    font-size: 12px;
    font-weight: 700;
    min-width: 20px;
    padding-top: 1px;
  }

  /* フィードバック */
  .feedback {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.7;
    display: none;
  }
  .feedback.correct { background: var(--correct-light); color: #15803d; border: 1px solid #bbf7d0; }
  .feedback.wrong { background: var(--wrong-light); color: #b91c1c; border: 1px solid #fecaca; }
  .feedback-title { font-weight: 700; margin-bottom: 4px; }
  .law-ref { font-size: 12px; margin-top: 6px; opacity: 0.8; }

  /* ナビゲーション */
  .nav-area {
    width: 100%;
    max-width: 640px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .btn-next {
    font-size: 14px;
    font-weight: 600;
    padding: 10px 28px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: none;
  }
  .btn-next:hover { background: #333; }

  /* θ表示 */
  .theta-card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1rem;
  }
  .theta-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .theta-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .theta-bar-wrap { flex: 1; }
  .theta-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
  }
  .theta-fill {
    height: 100%;
    background: linear-gradient(to right, #60a5fa, var(--accent));
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .score-row {
    display: flex;
    gap: 1.5rem;
  }
  .score-item { text-align: center; }
  .score-num { font-size: 20px; font-weight: 700; }
  .score-lbl { font-size: 11px; color: var(--muted); }

  /* 結果画面 */
  .result-card {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem 1.5rem;
    text-align: center;
    display: none;
  }
  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 0.5rem; }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
  }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .btn-retry {
    font-size: 14px;
    font-weight: 600;
    padding: 12px 32px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
  }

  /* ローディング */
  .loading {
    color: var(--muted);
    font-size: 14px;
    padding: 3rem;
    text-align: center;
  }

  /* エラー */
  .error-msg {
    color: var(--wrong);
    font-size: 14px;
    padding: 1rem;
    background: var(--wrong-light);
    border-radius: var(--radius-sm);
    width: 100%;
    max-width: 640px;
    display: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">U<span>-</span>Poc</div>
  <div class="session-info" id="session-info">ドリルモード</div>
</div>

<div class="error-msg" id="error-msg"></div>

<!-- フィルター -->
<div class="filter-bar" id="filter-bar">
  <select id="cat-select">
    <option value="all">すべてのカテゴリ</option>
    <option value="走行ルール">走行ルール</option>
    <option value="信号機の種類">信号機の種類</option>
    <option value="道路標識">道路標識</option>
    <option value="危険行為禁止">危険行為禁止</option>
    <option value="走行判断">走行判断（応用）</option>
    <option value="事故対応">事故対応</option>
    <option value="安全対策">安全対策</option>
    <option value="青切符・法律">青切符・法律</option>
    <option value="自転車マナー">自転車マナー</option>
    <option value="自転車整備・安全">自転車整備・安全</option>
  </select>
  <select id="level-select">
    <option value="all">すべてのレベル</option>
    <option value="easy">やさしい（低学年向け）</option>
    <option value="mid">ふつう（中学生向け）</option>
    <option value="hard">むずかしい（高校生以上）</option>
  </select>
  <button class="btn-start" onclick="startDrill()">スタート</button>
</div>

<!-- θ・スコア -->
<div class="theta-card" id="theta-card" style="display:none">
  <div>
    <div class="theta-label">理解度 θ</div>
    <div class="theta-val" id="theta-val">0.00</div>
  </div>
  <div class="theta-bar-wrap">
    <div class="theta-label">-3 ← → +3</div>
    <div class="theta-bar">
      <div class="theta-fill" id="theta-fill" style="width:50%"></div>
    </div>
  </div>
  <div class="score-row">
    <div class="score-item">
      <div class="score-num" id="score-correct">0</div>
      <div class="score-lbl">正解</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="score-total">0</div>
      <div class="score-lbl">問</div>
    </div>
  </div>
</div>

<!-- 進捗 -->
<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-meta">
    <span id="progress-text">1 / 10問</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<!-- 問題カード -->
<div class="card" id="q-card" style="display:none">
  <div class="card-head">
    <span class="q-num" id="q-num">Q1</span>
    <span class="diff-badge" id="diff-badge">b=0.0</span>
    <span class="cat-badge" id="cat-badge">カテゴリ</span>
  </div>
  <div class="card-body">
    <div class="note" id="q-note" style="display:none"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-title" id="fb-title"></div>
      <div id="fb-body"></div>
      <div class="law-ref" id="fb-law"></div>
    </div>
  </div>
</div>

<!-- 次へボタン -->
<div class="nav-area">
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題 →</button>
</div>

<!-- 結果 -->
<div class="result-card" id="result-card">
  <div class="result-title">ドリル完了！</div>
  <div class="result-sub" id="result-sub"></div>
  <div class="result-stats">
    <div class="stat-box">
      <div class="stat-val" id="res-correct">0</div>
      <div class="stat-lbl">正解数</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="res-pct">0%</div>
      <div class="stat-lbl">正答率</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="res-theta">0.00</div>
      <div class="stat-lbl">最終θ</div>
    </div>
  </div>
  <button class="btn-retry" onclick="resetDrill()">もう一度やる</button>
</div>

<div class="loading" id="loading" style="display:none">問題を読み込んでいます...</div>

<script>
const SUPABASE_URL = 'https://hwxreikopltisfoimuzf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3eHJlaWtvcGx0aXNmb2ltdXpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5MzYzNjgsImV4cCI6MjA2MjUxMjM2OH0.1GFTaJHHlmCSNFoIbMGFl49oYp2mXBsw-1E01-sxAiE';

let questions = [];
let currentIdx = 0;
let answered = false;
let theta = 0.0;
let correctCount = 0;
let totalAnswered = 0;
const DRILL_SIZE = 10;

function diffLabel(b) {
  if (b <= -0.5) return 'やさしい';
  if (b <= 0.5) return 'ふつう';
  return 'むずかしい';
}

function thetaToPercent(t) {
  return Math.min(100, Math.max(0, ((t + 3) / 6) * 100));
}

// 2PLM IRT でθ更新（EAP簡易版：単純ベイズ更新）
function updateTheta(theta, a, b, correct) {
  const p = 1 / (1 + Math.exp(-1.7 * a * (theta - b)));
  const info = 1.7 * 1.7 * a * a * p * (1 - p);
  const delta = correct ? (1 - p) / (info + 0.1) : -p / (info + 0.1);
  return Math.max(-3, Math.min(3, theta + delta * 0.8));
}

async function fetchQuestions(category, level) {
  let url = `${SUPABASE_URL}/rest/v1/questions?status=eq.active&limit=100&select=id,question_text,choices,correct_index,explanation,law_ref,irt_a,irt_b,category,tags`;
  if (category !== 'all') url += `&category=eq.${encodeURIComponent(category)}`;

  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    }
  });
  if (!res.ok) throw new Error('問題の取得に失敗しました');
  let data = await res.json();

  if (level !== 'all') {
    data = data.filter(q => {
      if (level === 'easy') return q.irt_b <= -0.5;
      if (level === 'mid') return q.irt_b > -0.5 && q.irt_b <= 0.5;
      if (level === 'hard') return q.irt_b > 0.5;
    });
  }

  // シャッフルしてDRILL_SIZE問取る
  data.sort(() => Math.random() - 0.5);
  return data.slice(0, DRILL_SIZE);
}

async function startDrill() {
  const cat = document.getElementById('cat-select').value;
  const level = document.getElementById('level-select').value;

  showLoading(true);
  hideError();

  try {
    questions = await fetchQuestions(cat, level);
    if (questions.length === 0) {
      showError('条件に合う問題が見つかりませんでした。フィルターを変えてみてください。');
      showLoading(false);
      return;
    }

    currentIdx = 0;
    theta = 0.0;
    correctCount = 0;
    totalAnswered = 0;

    document.getElementById('filter-bar').style.display = 'none';
    document.getElementById('theta-card').style.display = 'flex';
    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('q-card').style.display = 'block';
    document.getElementById('result-card').style.display = 'none';

    showLoading(false);
    renderQuestion();
  } catch(e) {
    showError(e.message);
    showLoading(false);
  }
}

function renderQuestion() {
  const q = questions[currentIdx];
  answered = false;

  // 進捗
  const pct = Math.round((currentIdx / questions.length) * 100);
  document.getElementById('progress-text').textContent = `${currentIdx + 1} / ${questions.length}問`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // ヘッダー
  document.getElementById('q-num').textContent = `Q${currentIdx + 1}`;
  document.getElementById('cat-badge').textContent = q.category;
  document.getElementById('diff-badge').textContent = diffLabel(q.irt_b);

  // 問題文（※注釈を分離）
  let qText = q.question_text;
  const noteMatch = qText.match(/^(※[^\n]+)\n?/);
  if (noteMatch) {
    const noteEl = document.getElementById('q-note');
    noteEl.textContent = noteMatch[1];
    noteEl.style.display = 'block';
    qText = qText.replace(noteMatch[0], '').trim();
  } else {
    document.getElementById('q-note').style.display = 'none';
  }
  // 問題文中の※を注釈に
  const inlineNote = qText.match(/※.+$/);
  if (inlineNote) {
    const noteEl = document.getElementById('q-note');
    noteEl.textContent = inlineNote[0];
    noteEl.style.display = 'block';
    qText = qText.replace(inlineNote[0], '').trim();
  }
  document.getElementById('q-text').textContent = qText;

  // 選択肢
  const choices = typeof q.choices === 'string' ? JSON.parse(q.choices) : q.choices;
  const labels = ['ア', 'イ', 'ウ', 'エ'];
  const container = document.getElementById('choices');
  container.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i, q);
    container.appendChild(btn);
  });

  // フィードバック・次へ非表示
  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';

  // θ表示更新
  updateThetaDisplay();
}

function selectAnswer(idx, q) {
  if (answered) return;
  answered = true;

  const correct = idx === q.correct_index;
  const choices = typeof q.choices === 'string' ? JSON.parse(q.choices) : q.choices;

  // ボタン状態
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct_index) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  // θ更新
  theta = updateTheta(theta, q.irt_a, q.irt_b, correct);
  if (correct) correctCount++;
  totalAnswered++;

  // スコア表示
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-total').textContent = totalAnswered;
  updateThetaDisplay();

  // フィードバック
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  document.getElementById('fb-title').textContent = correct ? '正解！' : `不正解　正解は「${['ア','イ','ウ','エ'][q.correct_index]}」`;
  document.getElementById('fb-body').textContent = q.explanation;
  document.getElementById('fb-law').textContent = q.law_ref ? `📌 ${q.law_ref}` : '';

  document.getElementById('btn-next').style.display = 'block';
  document.getElementById('btn-next').textContent =
    currentIdx + 1 >= questions.length ? '結果を見る' : '次の問題 →';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  const pct = Math.round((correctCount / totalAnswered) * 100);
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-theta').textContent = theta.toFixed(2);

  let comment = '';
  if (pct >= 80) comment = 'すばらしい！自転車ルールをよく理解しています。';
  else if (pct >= 60) comment = 'まずまずです。間違えた問題を復習しましょう。';
  else comment = 'もう少し練習が必要です。繰り返し挑戦しましょう。';
  document.getElementById('result-sub').textContent = `正答率 ${pct}%　${comment}`;

  document.getElementById('result-card').style.display = 'block';
}

function resetDrill() {
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('theta-card').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'flex';
}

function updateThetaDisplay() {
  document.getElementById('theta-val').textContent = theta.toFixed(2);
  document.getElementById('theta-fill').style.width = thetaToPercent(theta) + '%';
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}
</script>
</body>
</html>
