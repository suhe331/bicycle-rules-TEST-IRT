<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Poc</title>
<style>
:root{
  --bg:#f5f3ee;--surface:#fff;--border:#e2ddd5;--text:#1a1a18;--muted:#7a7870;
  --accent:#2563eb;--accent-light:#eff6ff;--correct:#16a34a;--correct-light:#f0fdf4;
  --wrong:#dc2626;--wrong-light:#fef2f2;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','BIZ UDPGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.25rem 1rem 3rem}
.wrap{width:100%;max-width:860px}
.screen{display:none;flex-direction:column;gap:12px}
.screen.active{display:flex}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.logo em{color:var(--accent);font-style:normal}
.user-row{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#3C3489}
.btn-sm{font-size:12px;padding:4px 10px;border:0.5px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--muted);cursor:pointer}

/* card */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}

/* login */
.login-wrap{width:100%;max-width:440px;margin:0 auto}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.form-lbl{font-size:13px;font-weight:500;margin-bottom:6px;display:block}
.form-lbl span{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.form-row{display:flex;gap:8px}
.form-row .fg{flex:1;margin-bottom:0}
.fg{margin-bottom:12px}
input[type=text],input[type=number]{width:100%;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text)}
input:focus{outline:2px solid var(--accent);border-color:transparent}
.btn-primary{width:100%;font-size:15px;font-weight:700;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;margin-top:4px}
.btn-primary:hover{background:#1d4ed8}
.login-note{font-size:12px;color:var(--muted);padding:10px;background:var(--bg);border-radius:var(--rs);line-height:1.6;margin-top:8px}

/* event banner */
.event-banner{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.event-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
.event-name{font-size:15px;font-weight:500}
.event-date{font-size:12px;color:var(--muted);margin-top:2px}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.pill-amber{background:#FAEEDA;color:#633806}
.pill-green{background:#E1F5EE;color:#085041}
.prog-row{margin-bottom:7px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.prog-label b{color:var(--text);font-weight:500}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}

/* score banner */
.score-banner{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.score-lbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.score-num{font-size:38px;font-weight:700;color:var(--accent);letter-spacing:-1px;line-height:1}
.score-max{font-size:13px;color:var(--muted);font-weight:400}
.score-rank{font-size:13px;color:#854F0B;margin-top:6px;font-weight:500;background:#FAEEDA;display:inline-block;padding:2px 10px;border-radius:20px}
.sb-rows{display:flex;flex-direction:column;gap:7px}
.sb-row{display:flex;align-items:center;gap:8px}
.sb-lbl{font-size:11px;color:var(--muted);width:60px}
.sb-bar{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.sb-fill{height:100%;border-radius:2px}
.sb-val{font-size:11px;color:var(--text);min-width:28px;text-align:right}

/* ranking */
.ranking-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.card-title{font-size:13px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cat-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.cat-tab{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer}
.cat-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:0.5px solid var(--border)}
.rank-n{font-size:13px;font-weight:500;color:var(--muted);width:20px;text-align:center}
.rank-av{width:28px;height:28px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#3C3489;flex-shrink:0}
.rank-name{flex:1;font-size:14px}
.rank-me{font-weight:500;color:var(--accent)}
.rank-bar-w{width:80px}
.rank-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.rank-sc{font-size:14px;font-weight:500;min-width:36px;text-align:right}

/* categories */
.cats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.cat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 12px;cursor:pointer;transition:border-color .15s}
.cat-card:hover{border-color:var(--accent)}
.cat-card.sel{border:1.5px solid var(--accent);background:var(--accent-light)}
.cat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cat-name{font-size:13px;font-weight:500}
.cat-cnt{font-size:11px;color:var(--muted)}
.cat-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.cat-fill{height:100%;border-radius:2px}
.cat-card.sel .cat-name{color:var(--accent)}

/* level */
.lv-row{display:flex;gap:6px}
.lv{flex:1;padding:9px 4px;border:0.5px solid var(--border);border-radius:var(--rs);background:var(--surface);font-size:13px;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.lv.sel{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.lv.disabled{opacity:0.4;cursor:default;pointer-events:none}

.sec-lbl{font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:4px}
.btn-big{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-big:hover{background:#1d4ed8}

/* drill */
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.q-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.q-head{display:flex;align-items:center;gap:8px;padding:.7rem 1.25rem;border-bottom:0.5px solid var(--border);background:var(--bg)}
.q-num{font-size:12px;color:var(--muted);font-weight:600}
.badge{font-size:11px;padding:2px 10px;border-radius:20px}
.badge-cat{background:var(--accent-light);color:var(--accent);font-weight:600;margin-left:auto}
.badge-lv{background:var(--border);color:var(--muted)}
.q-body{padding:1.25rem}
.note{font-size:12px;color:var(--muted);background:var(--bg);border-radius:var(--rs);padding:6px 10px;margin-bottom:.75rem;line-height:1.6}
.q-text{font-size:16px;line-height:1.75;margin-bottom:1.25rem;font-weight:500}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{width:100%;text-align:left;font-size:14px;line-height:1.6;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:flex-start;gap:10px}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light)}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{border-color:var(--correct);background:var(--correct-light);color:var(--correct)}
.choice-btn.wrong{border-color:var(--wrong);background:var(--wrong-light);color:var(--wrong)}
.choice-lbl{font-size:12px;font-weight:700;min-width:20px;padding-top:1px}
.feedback{margin-top:1rem;padding:1rem;border-radius:var(--rs);font-size:14px;line-height:1.7;display:none}
.feedback.correct{background:var(--correct-light);color:#15803d;border:1px solid #bbf7d0}
.feedback.wrong{background:var(--wrong-light);color:#b91c1c;border:1px solid #fecaca}
.fb-title{font-weight:700;margin-bottom:4px}
.law-ref{font-size:12px;margin-top:6px;opacity:.8}
.pts-badge{display:inline-block;font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px;background:#EEEDFE;color:#3C3489;margin-top:6px}
.nav-area{display:flex;justify-content:flex-end}
.btn-next{font-size:14px;font-weight:600;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;display:none}

/* result */
.result-wrap{text-align:center;padding:2rem 1.5rem}
.result-title{font-size:22px;font-weight:700;margin-bottom:.5rem}
.result-sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
.result-score{font-size:48px;font-weight:700;color:var(--accent);letter-spacing:-2px;margin-bottom:.25rem}
.result-score-lbl{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-box{background:var(--bg);border-radius:var(--rs);padding:.75rem}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.btn-home{font-size:14px;font-weight:600;padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);cursor:pointer}

.error-msg{font-size:14px;padding:.75rem 1rem;background:var(--wrong-light);color:var(--wrong);border-radius:var(--rs);display:none}
.loading{color:var(--muted);font-size:14px;padding:3rem;text-align:center;display:none}

.no-event{font-size:14px;color:var(--muted);padding:1.5rem;text-align:center;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r)}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="logo">U<em>-</em>Poc</div>
  <div class="user-row" id="user-row" style="display:none">
    <span style="font-size:13px;color:var(--muted)" id="user-name-disp"></span>
    <div class="avatar" id="user-avatar"></div>
    <button class="btn-sm" onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="error-msg" id="error-msg"></div>
<div class="loading" id="loading">読み込み中...</div>

<!-- ログイン -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div class="card">
      <div class="login-title">はじめる</div>
      <div class="login-sub">学校コードと情報を入力してください</div>
      <div class="fg">
        <label class="form-lbl">学校コード</label>
        <input type="text" id="school-code" placeholder="例：CHOFU001" style="text-transform:uppercase">
      </div>
      <div class="form-row">
        <div class="fg"><label class="form-lbl">学年</label><input type="number" id="grade" min="1" max="6" placeholder="2"></div>
        <div class="fg"><label class="form-lbl">クラス</label><input type="number" id="class-num" min="1" max="20" placeholder="3"></div>
        <div class="fg"><label class="form-lbl">出席番号</label><input type="number" id="student-num" min="1" max="50" placeholder="6"></div>
      </div>
      <div class="fg">
        <label class="form-lbl">ニックネーム <span>表示名・自由に決めてOK</span></label>
        <input type="text" id="nickname" placeholder="例：むた" maxlength="20">
      </div>
      <button class="btn-primary" onclick="login()">スタート</button>
      <div class="login-note">📌 名前やメールアドレスは不要です。個人情報は登録しません。</div>
    </div>
  </div>
</div>

<!-- ホーム -->
<div class="screen" id="screen-home">

  <!-- イベントバナー -->
  <div id="event-area"></div>

  <!-- スコアバナー -->
  <div class="score-banner" id="score-banner" style="display:none">
    <div>
      <div class="score-lbl">あなたのスコア</div>
      <div class="score-num" id="score-num">0<span class="score-max"> / 1000</span></div>
      <div class="score-rank" id="score-rank"></div>
    </div>
    <div class="sb-rows">
      <div class="sb-row">
        <div class="sb-lbl">理解度</div>
        <div class="sb-bar"><div class="sb-fill" id="sb-theta" style="background:#7F77DD"></div></div>
        <div class="sb-val" id="sbv-theta">0</div>
      </div>
      <div class="sb-row">
        <div class="sb-lbl">正答率</div>
        <div class="sb-bar"><div class="sb-fill" id="sb-acc" style="background:#1D9E75"></div></div>
        <div class="sb-val" id="sbv-acc">0</div>
      </div>
      <div class="sb-row">
        <div class="sb-lbl">問題数</div>
        <div class="sb-bar"><div class="sb-fill" id="sb-vol" style="background:#EF9F27"></div></div>
        <div class="sb-val" id="sbv-vol">0</div>
      </div>
    </div>
  </div>

  <!-- ランキング -->
  <div class="ranking-card" id="ranking-area" style="display:none">
    <div class="card-title">
      <i class="ti ti-trophy" aria-hidden="true" style="font-size:15px;color:#BA7517"></i>
      ランキング（<span id="class-label"></span>）
    </div>
    <div class="cat-tabs" id="rank-tabs"></div>
    <div id="rank-list"></div>
  </div>

  <div class="sec-lbl"><i class="ti ti-layout-grid" aria-hidden="true" style="font-size:13px"></i> カテゴリを選ぶ</div>
  <div class="cats-grid" id="cats-grid"></div>

  <div>
    <div class="sec-lbl" style="margin-bottom:10px"><i class="ti ti-adjustments" aria-hidden="true" style="font-size:13px"></i> レベル</div>
    <div class="lv-row" id="lv-row">
      <div class="lv sel" data-lv="all" onclick="selectLevel(this)">すべて</div>
      <div class="lv" data-lv="easy" onclick="selectLevel(this)">やさしい</div>
      <div class="lv" data-lv="mid" onclick="selectLevel(this)">ふつう</div>
      <div class="lv" data-lv="hard" onclick="selectLevel(this)">むずかしい</div>
    </div>
  </div>

  <button class="btn-big" onclick="startDrill()">
    <i class="ti ti-player-play" aria-hidden="true" style="font-size:16px"></i>
    今日の5問をはじめる
  </button>
</div>

<!-- ドリル -->
<div class="screen" id="screen-drill">
  <div>
    <div class="progress-meta">
      <span id="progress-text">1 / 5問</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="q-card">
    <div class="q-head">
      <span class="q-num" id="q-num">Q1</span>
      <span class="badge badge-lv" id="diff-badge">やさしい</span>
      <span class="badge badge-cat" id="cat-badge">カテゴリ</span>
    </div>
    <div class="q-body">
      <div class="note" id="q-note" style="display:none"></div>
      <div id="q-photo-wrap" style="display:none;margin-bottom:1rem">
        <img id="q-photo" src="" alt="問題の写真" style="width:100%;max-height:280px;object-fit:contain;border-radius:var(--rs);border:0.5px solid var(--border);background:#f5f3ee">
        <div id="q-location" style="font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px"></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback">
        <div class="fb-title" id="fb-title"></div>
        <div id="fb-body"></div>
        <div class="law-ref" id="fb-law"></div>
        <div class="pts-badge" id="pts-badge" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="nav-area">
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- 結果 -->
<div class="screen" id="screen-result">
  <div class="card">
    <div class="result-wrap">
      <div class="result-title">ドリル完了！</div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-score" id="result-score">+0</div>
      <div class="result-score-lbl">今回の獲得ポイント</div>
      <div class="result-stats">
        <div class="stat-box"><div class="stat-val" id="res-correct">0</div><div class="stat-lbl">正解数</div></div>
        <div class="stat-box"><div class="stat-val" id="res-pct">0%</div><div class="stat-lbl">正答率</div></div>
        <div class="stat-box"><div class="stat-val" id="res-theta">0.00</div><div class="stat-lbl">理解度 θ</div></div>
      </div>
      <button class="btn-home" onclick="goHome()">ホームに戻る</button>
    </div>
  </div>
</div>

</div><!-- /wrap -->

<script>
const SUPABASE_URL='https://hwxreikopltisfoimuzf.supabase.co';
const SUPABASE_KEY='sb_publishable_IibWbT-1J9MeXGN5XkJfMw_PqsRfgsi';
const DRILL_SIZE=5;
const CATS=[
  {name:'走行ルール',color:'#2563eb',cnt:9},
  {name:'信号機の種類',color:'#BA7517',cnt:10},
  {name:'道路標識',color:'#1D9E75',cnt:10},
  {name:'危険行為禁止',color:'#E24B4A',cnt:8},
  {name:'走行判断',color:'#7F77DD',cnt:10},
  {name:'事故対応',color:'#888780',cnt:9},
  {name:'安全対策',color:'#D4537E',cnt:8},
  {name:'青切符・法律',color:'#854F0B',cnt:8},
  {name:'自転車マナー',color:'#D4537E',cnt:12},
  {name:'自転車整備・安全',color:'#7F77DD',cnt:16},
];

let currentUser=null,currentEvent=null,eventScore=null;
let questions=[],currentIdx=0,answered=false;
let theta=0,correctCount=0,totalAnswered=0,sessionPoints=0;
let selectedCat='all',selectedLevel='all';

function api(path,opts={}){
  return fetch(SUPABASE_URL+path,{...opts,headers:{
    'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
    'Content-Type':'application/json','Prefer':'return=representation',
    ...(opts.headers||{})
  }});
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showError(msg){const el=document.getElementById('error-msg');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}
function showLoading(v){document.getElementById('loading').style.display=v?'block':'none'}

// IRT Fisher情報量ベースのポイント計算
function calcPoints(a,b,th,correct){
  const p=1/(1+Math.exp(-1.7*a*(th-b)));
  const info=1.7*1.7*a*a*p*(1-p);
  const base=Math.round(info*100);
  return correct?base:Math.round(base*0.3);
}
function updateTheta(th,a,b,correct){
  const p=1/(1+Math.exp(-1.7*a*(th-b)));
  const info=1.7*1.7*a*a*p*(1-p);
  const delta=correct?(1-p)/(info+0.1):-p/(info+0.1);
  return Math.max(-3,Math.min(3,th+delta*0.8));
}
function calcTotalScore(th,acc,vol){
  const ts=Math.round(600*(th+3)/6);
  const as=Math.round(200*acc);
  const vs=Math.round(200*Math.min(vol/50,1));
  return{total:ts+as+vs,ts,as,vs};
}
function thetaToPercent(t){return Math.min(100,Math.max(0,((t+3)/6)*100))}
function diffLabel(b){return b<=-0.5?'やさしい':b<=0.5?'ふつう':'むずかしい'}

// ── ログイン ──
async function login(){
  const sc=document.getElementById('school-code').value.trim().toUpperCase();
  const gr=parseInt(document.getElementById('grade').value);
  const cl=parseInt(document.getElementById('class-num').value);
  const sn=parseInt(document.getElementById('student-num').value);
  const nk=document.getElementById('nickname').value.trim();
  if(!sc||!gr||!cl||!sn||!nk){showError('すべての項目を入力してください');return}
  showLoading(true);
  try{
    const res=await api(`/rest/v1/student_profiles?school_code=eq.${sc}&grade=eq.${gr}&class_num=eq.${cl}&student_num=eq.${sn}&select=*`);
    const data=await res.json();
    if(data.length>0){
      currentUser=data[0];
      if(currentUser.nickname!==nk){
        await api(`/rest/v1/student_profiles?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({nickname:nk,last_active:new Date().toISOString()})});
        currentUser.nickname=nk;
      }
    }else{
      const ins=await api('/rest/v1/student_profiles',{method:'POST',body:JSON.stringify({school_code:sc,grade:gr,class_num:cl,student_num:sn,nickname:nk,theta:0.0})});
      const nd=await ins.json();
      currentUser=Array.isArray(nd)?nd[0]:nd;
    }
    theta=currentUser.theta||0;
    localStorage.setItem('upoc_uid',currentUser.id);
    showLoading(false);
    goHome();
  }catch(e){showError('ログイン失敗: '+e.message);showLoading(false)}
}
function logout(){currentUser=null;localStorage.removeItem('upoc_uid');document.getElementById('user-row').style.display='none';showScreen('screen-login')}

// ── ホーム ──
async function goHome(){
  document.getElementById('user-row').style.display='flex';
  document.getElementById('user-name-disp').textContent=currentUser.nickname+' さん';
  document.getElementById('user-avatar').textContent=currentUser.nickname[0];
  renderCats();
  await loadEvent();
  showScreen('screen-home');
}

function renderCats(){
  const grid=document.getElementById('cats-grid');
  grid.innerHTML=CATS.map(c=>`
    <div class="cat-card${c.name===selectedCat?' sel':''}" onclick="selectCat(this,'${c.name}')">
      <div class="cat-top"><div class="cat-name">${c.name}</div><div class="cat-cnt">${c.cnt}問</div></div>
      <div class="cat-bar"><div class="cat-fill" style="width:${Math.round(Math.random()*60+20)}%;background:${c.color}"></div></div>
    </div>`).join('');
}

function selectCat(el,name){
  selectedCat=name;
  document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function selectLevel(el){
  if(el.classList.contains('disabled'))return;
  selectedLevel=el.dataset.lv;
  document.querySelectorAll('.lv').forEach(l=>l.classList.remove('sel'));
  el.classList.add('sel');
}

async function loadEvent(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const sc=currentUser.school_code;
    const res=await api(`/rest/v1/events?school_code=eq.${sc}&start_date=lte.${today}&end_date=gte.${today}&select=*&limit=1`);
    const data=await res.json();
    const area=document.getElementById('event-area');

    if(!data||data.length===0){
      area.innerHTML='<div class="no-event">現在開催中のイベントはありません</div>';
      document.getElementById('score-banner').style.display='none';
      document.getElementById('ranking-area').style.display='none';
      return;
    }

    currentEvent=data[0];

    // レベル固定
    applyFixedLevel(currentEvent.fixed_level);

    // イベントバナー描画
    const start=new Date(currentEvent.start_date);
    const end=new Date(currentEvent.end_date);
    const now=new Date();
    const total=Math.round((end-start)/(1000*60*60*24))+1;
    const passed=Math.min(total,Math.round((now-start)/(1000*60*60*24))+1);
    const remaining=Math.max(0,Math.round((end-now)/(1000*60*60*24)));
    const eventPct=Math.round(passed/total*100);

    area.innerHTML=`
      <div class="event-banner">
        <div class="event-head">
          <div><div class="event-name">${currentEvent.name}</div>
          <div class="event-date">${currentEvent.start_date} 〜 ${currentEvent.end_date}</div></div>
          <div class="pill pill-amber">残り${remaining}日</div>
        </div>
        <div class="prog-row">
          <div class="prog-label"><b>イベント進捗</b><span>${passed} / ${total}日経過</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${eventPct}%;background:#2563eb"></div></div>
        </div>
        <div class="prog-row" id="prog-achievement">
          <div class="prog-label"><b>自分の達成率</b><span id="ach-pct">-</span></div>
          <div class="prog-bar"><div class="prog-fill" id="ach-fill" style="width:0%;background:#1D9E75"></div></div>
        </div>
        <div class="prog-row" style="margin-bottom:0">
          <div class="prog-label"><b>クラス平均</b><span id="avg-pct">-</span></div>
          <div class="prog-bar"><div class="prog-fill" id="avg-fill" style="width:0%;background:#888780"></div></div>
        </div>
      </div>`;

    await loadEventScore();
    await loadRanking('総合');
  }catch(e){console.error(e)}
}

function applyFixedLevel(level){
  const lvRow=document.getElementById('lv-row');
  const lvBtns=lvRow.querySelectorAll('.lv');
  if(level==='all'){
    lvBtns.forEach(b=>b.classList.remove('disabled'));
    return;
  }
  // 固定レベルを選択状態にして他を無効化
  lvBtns.forEach(b=>{
    b.classList.remove('sel','disabled');
    if(b.dataset.lv===level){b.classList.add('sel');selectedLevel=level;}
    else b.classList.add('disabled');
  });
}

async function loadEventScore(){
  if(!currentEvent||!currentUser)return;
  try{
    const res=await api(`/rest/v1/event_scores?event_id=eq.${currentEvent.id}&student_id=eq.${currentUser.id}&select=*`);
    const data=await res.json();
    eventScore=data.length>0?data[0]:null;

    const sc=document.getElementById('score-banner');
    if(!eventScore||eventScore.total_count===0){sc.style.display='none';return}

    sc.style.display='flex';
    const s=eventScore;
    document.getElementById('score-num').innerHTML=s.total_score+'<span class="score-max"> / 1000</span>';
    document.getElementById('sb-theta').style.width=(s.theta_score/600*100)+'%';
    document.getElementById('sbv-theta').textContent=s.theta_score;
    document.getElementById('sb-acc').style.width=(s.accuracy_score/200*100)+'%';
    document.getElementById('sbv-acc').textContent=s.accuracy_score;
    document.getElementById('sb-vol').style.width=(s.volume_score/200*100)+'%';
    document.getElementById('sbv-vol').textContent=s.volume_score;

    // 達成率（正答率ベース）
    const achPct=Math.round(s.correct_count/Math.max(s.total_count,1)*100);
    document.getElementById('ach-pct').textContent=achPct+'%';
    document.getElementById('ach-fill').style.width=achPct+'%';

    // クラス平均
    await loadClassAvg();
  }catch(e){console.error(e)}
}

async function loadClassAvg(){
  if(!currentEvent)return;
  try{
    const res=await api(`/rest/v1/event_scores?event_id=eq.${currentEvent.id}&school_code=eq.${currentUser.school_code}&select=correct_count,total_count`);
    const data=await res.json();
    if(!data||data.length===0)return;
    const avgAch=Math.round(data.reduce((a,b)=>a+(b.correct_count/Math.max(b.total_count,1)),0)/data.length*100);
    document.getElementById('avg-pct').textContent=avgAch+'%';
    document.getElementById('avg-fill').style.width=avgAch+'%';
  }catch(e){}
}

async function loadRanking(catFilter){
  if(!currentEvent)return;
  const rankArea=document.getElementById('ranking-area');
  rankArea.style.display='block';

  const sc=currentUser.school_code;
  const gr=currentUser.grade;
  const cl=currentUser.class_num;
  document.getElementById('class-label').textContent=`${gr}年${cl}組`;

  // タブ
  const tabs=['総合',...CATS.slice(0,5).map(c=>c.name)];
  document.getElementById('rank-tabs').innerHTML=tabs.map(t=>
    `<div class="cat-tab${t===catFilter?' on':''}" onclick="loadRanking('${t}')">${t==='総合'?'総合':t.replace('の種類','').replace('・法律','').replace('禁止','')}</div>`
  ).join('');

  try{
    let rankData;
    if(catFilter==='総合'){
      const res=await api(`/rest/v1/event_scores?event_id=eq.${currentEvent.id}&school_code=eq.${sc}&select=student_id,total_score&order=total_score.desc&limit=10`);
      rankData=await res.json();
    }else{
      // カテゴリ別: event_responsesから集計
      const res=await api(`/rest/v1/event_responses?event_id=eq.${currentEvent.id}&category=eq.${encodeURIComponent(catFilter)}&select=student_id,is_correct,points_earned`);
      const raw=await res.json();
      const byStudent={};
      raw.forEach(r=>{
        if(!byStudent[r.student_id])byStudent[r.student_id]={student_id:r.student_id,total_score:0};
        byStudent[r.student_id].total_score+=r.points_earned||0;
      });
      rankData=Object.values(byStudent).sort((a,b)=>b.total_score-a.total_score).slice(0,10);
    }

    if(!rankData||rankData.length===0){
      document.getElementById('rank-list').innerHTML='<div style="font-size:13px;color:var(--muted);padding:12px 0">まだデータがありません</div>';
      return;
    }

    // ニックネームを取得
    const ids=rankData.map(r=>r.student_id);
    const profRes=await api(`/rest/v1/student_profiles?id=in.(${ids.join(',')})&select=id,nickname`);
    const profs=await profRes.json();
    const profMap={};
    profs.forEach(p=>profMap[p.id]=p.nickname);

    const maxScore=rankData[0].total_score||1;
    const colors=['#BA7517','#888780','#854F0B'];
    document.getElementById('rank-list').innerHTML=rankData.map((r,i)=>{
      const nk=profMap[r.student_id]||'?';
      const isMe=r.student_id===currentUser.id;
      const pct=Math.round(r.total_score/maxScore*100);
      return`<div class="rank-item">
        <div class="rank-n" style="${i===0?'color:#BA7517':''}">${i+1}</div>
        <div class="rank-av" style="${isMe?'background:#EFF6FF;color:#2563eb':''}">${nk[0]}</div>
        <div class="rank-name${isMe?' rank-me':''}">${nk}${isMe?' （自分）':''}</div>
        <div class="rank-bar-w"><div class="rank-bar"><div style="height:100%;width:${pct}%;background:${isMe?'#2563eb':colors[i]||'#888780'};border-radius:2px"></div></div></div>
        <div class="rank-sc" style="${isMe?'color:#2563eb':''}">${r.total_score}</div>
      </div>`;
    }).join('');

    // 自分の順位
    const myRank=rankData.findIndex(r=>r.student_id===currentUser.id)+1;
    if(myRank>0)document.getElementById('score-rank').textContent=`クラス ${myRank}位 / ${rankData.length}人中`;
  }catch(e){console.error(e)}
}

// ── ドリル ──
async function startDrill(){
  showLoading(true);
  try{
    const url=`/rest/v1/questions?status=eq.active&limit=200&select=id,question_text,choices,correct_index,explanation,law_ref,irt_a,irt_b,category,photo_url,location_tag`;
    
    const res=await api(url);
    let data=await res.json();
    if(selectedCat!=='all') data=data.filter(q=>q.category===selectedCat);

    if(selectedLevel!=='all'){
      data=data.filter(q=>selectedLevel==='easy'?q.irt_b<=-0.5:selectedLevel==='mid'?q.irt_b>-0.5&&q.irt_b<=0.5:q.irt_b>0.5);
    }
    if(data.length===0){showError('条件に合う問題が見つかりませんでした');showLoading(false);return}

    data.sort(()=>Math.random()-0.5);
    questions=data.slice(0,DRILL_SIZE);
    currentIdx=0;correctCount=0;totalAnswered=0;sessionPoints=0;
    showLoading(false);
    showScreen('screen-drill');
    renderQuestion();
  }catch(e){showError('問題の取得に失敗しました');showLoading(false)}
}

function renderQuestion(){
  const q=questions[currentIdx];
  answered=false;
  const pct=Math.round(currentIdx/questions.length*100);
  document.getElementById('progress-text').textContent=`${currentIdx+1} / ${questions.length}問`;
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('q-num').textContent=`Q${currentIdx+1}`;
  document.getElementById('cat-badge').textContent=q.category;
  document.getElementById('diff-badge').textContent=diffLabel(q.irt_b);

  let qText=q.question_text;
  const noteEl=document.getElementById('q-note');
  const nm=qText.match(/※[^\n]+/);
  if(nm){noteEl.textContent=nm[0];noteEl.style.display='block';qText=qText.replace(nm[0],'').trim();}
  else noteEl.style.display='none';
  // 写真表示
  const photoWrap=document.getElementById('q-photo-wrap');
  if(q.photo_url){
    document.getElementById('q-photo').src=q.photo_url;
    const loc=document.getElementById('q-location');
    loc.innerHTML=q.location_tag?`📍 ${q.location_tag}`:'';
    photoWrap.style.display='block';
  }else{
    photoWrap.style.display='none';
  }
  document.getElementById('q-text').textContent=qText;

  const choices=typeof q.choices==='string'?JSON.parse(q.choices):q.choices;
  const labels=['ア','イ','ウ','エ'];
  const container=document.getElementById('choices');
  container.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-lbl">${labels[i]}</span><span>${c}</span>`;
    btn.onclick=()=>selectAnswer(i,q);
    container.appendChild(btn);
  });

  document.getElementById('feedback').style.display='none';
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('pts-badge').style.display='none';
}

function selectAnswer(idx,q){
  if(answered)return;
  answered=true;
  const correct=idx===q.correct_index;
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.correct_index)btn.classList.add('correct');
    else if(i===idx&&!correct)btn.classList.add('wrong');
  });

  const pts=calcPoints(q.irt_a,q.irt_b,theta,correct);
  sessionPoints+=pts;
  theta=updateTheta(theta,q.irt_a,q.irt_b,correct);
  if(correct)correctCount++;
  totalAnswered++;

  const fb=document.getElementById('feedback');
  fb.style.display='block';
  fb.className='feedback '+(correct?'correct':'wrong');
  document.getElementById('fb-title').textContent=correct?'正解！':`不正解　正解は「${['ア','イ','ウ','エ'][q.correct_index]}」`;
  document.getElementById('fb-body').textContent=q.explanation;
  document.getElementById('fb-law').textContent=q.law_ref?'📌 '+q.law_ref:'';
  const pb=document.getElementById('pts-badge');
  pb.textContent=`+${pts}pt`;
  pb.style.display='inline-block';

  // event_responsesに記録
  if(currentEvent&&currentUser){
    api('/rest/v1/event_responses',{method:'POST',body:JSON.stringify({
      event_id:currentEvent.id,student_id:currentUser.id,
      question_id:q.id,category:q.category,
      is_correct:correct,irt_a:q.irt_a,irt_b:q.irt_b,
      theta_at_answer:parseFloat(theta.toFixed(3)),
      points_earned:pts
    })}).catch(e=>console.error(e));
  }

  const bn=document.getElementById('btn-next');
  bn.style.display='block';
  bn.textContent=currentIdx+1>=questions.length?'結果を見る':'次の問題 →';
}

async function nextQuestion(){
  currentIdx++;
  if(currentIdx>=questions.length){await saveSession();showResult();}
  else renderQuestion();
}

async function saveSession(){
  // θ更新
  if(currentUser){
    await api(`/rest/v1/student_profiles?id=eq.${currentUser.id}`,{
      method:'PATCH',body:JSON.stringify({theta:parseFloat(theta.toFixed(3)),last_active:new Date().toISOString()})
    }).catch(e=>console.error(e));
    currentUser.theta=theta;
  }
  // event_scores upsert
  if(currentEvent&&currentUser){
    const acc=correctCount/totalAnswered;
    const prevTotal=(eventScore?.total_count||0);
    const prevCorrect=(eventScore?.correct_count||0);
    const newTotal=prevTotal+totalAnswered;
    const newCorrect=prevCorrect+correctCount;
    const newAcc=newCorrect/newTotal;
    const sc=calcTotalScore(theta,newAcc,newTotal);
    const payload={
      event_id:currentEvent.id,student_id:currentUser.id,
      school_code:currentUser.school_code,
      total_score:sc.total,correct_count:newCorrect,total_count:newTotal,
      theta_score:sc.ts,accuracy_score:sc.as,volume_score:sc.vs,
      updated_at:new Date().toISOString()
    };
    await api('/rest/v1/event_scores',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify(payload)
    }).catch(e=>console.error(e));
    eventScore=payload;
  }
}

function showResult(){
  const pct=Math.round(correctCount/totalAnswered*100);
  document.getElementById('res-correct').textContent=correctCount;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-theta').textContent=theta.toFixed(2);
  document.getElementById('result-score').textContent='+'+sessionPoints;
  const comment=pct>=80?'すばらしい！':pct>=60?'まずまずです。':'もう少し練習しましょう。';
  document.getElementById('result-sub').textContent=`正答率 ${pct}%　${comment}`;
  showScreen('screen-result');
}

// ── 起動時復元 ──
(async function init(){
  const uid=localStorage.getItem('upoc_uid');
  if(!uid)return;
  try{
    const res=await api(`/rest/v1/student_profiles?id=eq.${uid}&select=*`);
    const data=await res.json();
    if(data.length>0){currentUser=data[0];theta=currentUser.theta||0;goHome();}
  }catch(e){}
})();
</script>
