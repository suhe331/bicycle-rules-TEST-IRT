<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Poc ドリルモード</title>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2da;
    --text: #1a1a18;
    --muted: #7a7870;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --correct: #16a34a;
    --correct-light: #f0fdf4;
    --wrong: #dc2626;
    --wrong-light: #fef2f2;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'BIZ UDPGothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
  }
  .header {
    width: 100%; max-width: 640px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .user-info { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .btn-logout {
    font-size: 12px; padding: 4px 10px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--muted); cursor: pointer;
  }

  /* ログイン画面 */
  .login-card {
    width: 100%; max-width: 480px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2rem 1.5rem;
  }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 0.25rem; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; }
  .form-label span { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 4px; }
  .form-row { display: flex; gap: 8px; }
  .form-row .form-group { flex: 1; margin-bottom: 0; }
  input[type="text"], input[type="number"], select {
    width: 100%; font-size: 14px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    appearance: none;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .btn-login {
    width: 100%; margin-top: 1.25rem;
    font-size: 15px; font-weight: 700; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
  }
  .btn-login:hover { background: #1d4ed8; }
  .login-note {
    font-size: 12px; color: var(--muted); margin-top: 1rem;
    padding: 0.75rem; background: var(--bg); border-radius: var(--radius-sm);
    line-height: 1.6;
  }

  /* ホーム画面 */
  .home-grid {
    width: 100%; max-width: 640px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem;
  }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .theta-bar {
    height: 6px; background: var(--border); border-radius: 3px;
    overflow: hidden; margin-top: 8px;
  }
  .theta-fill {
    height: 100%; background: var(--accent);
    border-radius: 3px; transition: width 0.6s ease;
  }

  .section-title {
    width: 100%; max-width: 640px;
    font-size: 14px; font-weight: 700; color: var(--muted);
    margin-bottom: 0.75rem; margin-top: 0.25rem;
  }

  /* フィルター */
  .filter-bar {
    width: 100%; max-width: 640px;
    display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  select.filter-select {
    flex: 1; min-width: 140px; font-size: 13px; padding: 8px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); cursor: pointer;
  }
  .btn-start {
    font-size: 14px; font-weight: 700; padding: 8px 24px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
  }
  .btn-start:hover { background: #1d4ed8; }

  /* 進捗バー */
  .progress-wrap { width: 100%; max-width: 640px; margin-bottom: 1.25rem; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 6px;
  }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* 問題カード */
  .card {
    width: 100%; max-width: 640px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem;
  }
  .card-head {
    display: flex; align-items: center; gap: 8px;
    padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .q-num { font-size: 12px; color: var(--muted); font-weight: 600; }
  .cat-badge {
    font-size: 11px; padding: 2px 10px; border-radius: 20px;
    background: var(--accent-light); color: var(--accent);
    font-weight: 600; margin-left: auto;
  }
  .diff-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--border); color: var(--muted);
  }
  .card-body { padding: 1.25rem; }
  .q-text { font-size: 16px; line-height: 1.75; margin-bottom: 1.25rem; font-weight: 500; }
  .note {
    font-size: 12px; color: var(--muted); background: var(--bg);
    border-radius: var(--radius-sm); padding: 6px 10px;
    margin-bottom: 0.75rem; line-height: 1.6;
  }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    width: 100%; text-align: left; font-size: 14px; line-height: 1.6;
    padding: 12px 16px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { border-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .choice-btn.wrong { border-color: var(--wrong); background: var(--wrong-light); color: var(--wrong); }
  .choice-label { font-size: 12px; font-weight: 700; min-width: 20px; padding-top: 1px; }
  .feedback {
    margin-top: 1rem; padding: 1rem; border-radius: var(--radius-sm);
    font-size: 14px; line-height: 1.7; display: none;
  }
  .feedback.correct { background: var(--correct-light); color: #15803d; border: 1px solid #bbf7d0; }
  .feedback.wrong { background: var(--wrong-light); color: #b91c1c; border: 1px solid #fecaca; }
  .feedback-title { font-weight: 700; margin-bottom: 4px; }
  .law-ref { font-size: 12px; margin-top: 6px; opacity: 0.8; }
  .nav-area { width: 100%; max-width: 640px; display: flex; justify-content: flex-end; }
  .btn-next {
    font-size: 14px; font-weight: 600; padding: 10px 28px;
    background: var(--text); color: #fff;
    border: none; border-radius: var(--radius-sm); cursor: pointer; display: none;
  }
  .btn-next:hover { background: #333; }

  /* 結果 */
  .result-card {
    width: 100%; max-width: 640px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2rem 1.5rem;
    text-align: center; display: none;
  }
  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 0.5rem; }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 0.75rem; }
  .stat-box .stat-val { font-size: 24px; font-weight: 700; }
  .stat-box .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .btn-retry {
    font-size: 14px; font-weight: 600; padding: 12px 32px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
  }

  .error-msg {
    color: var(--wrong); font-size: 14px; padding: 0.75rem 1rem;
    background: var(--wrong-light); border-radius: var(--radius-sm);
    width: 100%; max-width: 640px; display: none; margin-bottom: 1rem;
  }
  .loading { color: var(--muted); font-size: 14px; padding: 3rem; text-align: center; }

  /* 画面の表示切り替え */
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
  .screen.active { display: flex; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">U<span>-</span>Poc</div>
  <div class="user-info" id="user-info" style="display:none">
    <span id="user-name-disp"></span>
    <button class="btn-logout" onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="error-msg" id="error-msg"></div>

<!-- ログイン画面 -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <div class="login-title">はじめる</div>
    <div class="login-sub">学校コードと情報を入力してください</div>

    <div class="form-group">
      <label class="form-label">学校コード</label>
      <input type="text" id="school-code" placeholder="例：CHOFU001" style="text-transform:uppercase">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">学年</label>
        <input type="number" id="grade" min="1" max="6" placeholder="1">
      </div>
      <div class="form-group">
        <label class="form-label">クラス</label>
        <input type="number" id="class-num" min="1" max="20" placeholder="1">
      </div>
      <div class="form-group">
        <label class="form-label">出席番号</label>
        <input type="number" id="student-num" min="1" max="50" placeholder="1">
      </div>
    </div>

    <div class="form-group" style="margin-top:1rem">
      <label class="form-label">ニックネーム <span>（表示名・自由に決めてOK）</span></label>
      <input type="text" id="nickname" placeholder="例：たろう" maxlength="20">
    </div>

    <button class="btn-login" onclick="login()">スタート</button>

    <div class="login-note">
      📌 名前やメールアドレスは必要ありません。個人情報は登録しません。
    </div>
  </div>
</div>

<!-- ホーム画面 -->
<div class="screen" id="screen-home">
  <div class="home-grid">
    <div class="stat-card">
      <div class="stat-lbl">理解度 θ</div>
      <div class="stat-val" id="home-theta">0.00</div>
      <div class="theta-bar"><div class="theta-fill" id="home-theta-bar" style="width:50%"></div></div>
      <div class="stat-sub" id="home-theta-label">スタートライン</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">これまでの問題数</div>
      <div class="stat-val" id="home-total">0</div>
      <div class="stat-sub">問 解いた</div>
    </div>
  </div>

  <div class="section-title">カテゴリとレベルを選んでスタート</div>

  <div class="filter-bar">
    <select class="filter-select" id="cat-select">
      <option value="all">すべてのカテゴリ</option>
      <option value="走行ルール">走行ルール</option>
      <option value="信号機の種類">信号機の種類</option>
      <option value="道路標識">道路標識</option>
      <option value="危険行為禁止">危険行為禁止</option>
      <option value="走行判断">走行判断（応用）</option>
      <option value="事故対応">事故対応</option>
      <option value="安全対策">安全対策</option>
      <option value="青切符・法律">青切符・法律</option>
      <option value="自転車マナー">自転車マナー</option>
      <option value="自転車整備・安全">自転車整備・安全</option>
    </select>
    <select class="filter-select" id="level-select">
      <option value="all">すべてのレベル</option>
      <option value="easy">やさしい</option>
      <option value="mid">ふつう</option>
      <option value="hard">むずかしい</option>
    </select>
    <button class="btn-start" onclick="startDrill()">スタート</button>
  </div>
</div>

<!-- ドリル画面 -->
<div class="screen" id="screen-drill">
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-meta">
      <span id="progress-text">1 / 10問</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="card" id="q-card">
    <div class="card-head">
      <span class="q-num" id="q-num">Q1</span>
      <span class="diff-badge" id="diff-badge">やさしい</span>
      <span class="cat-badge" id="cat-badge">カテゴリ</span>
    </div>
    <div class="card-body">
      <div class="note" id="q-note" style="display:none"></div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="fb-title"></div>
        <div id="fb-body"></div>
        <div class="law-ref" id="fb-law"></div>
      </div>
    </div>
  </div>

  <div class="nav-area">
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- 結果画面 -->
<div class="screen" id="screen-result">
  <div class="result-card" style="display:block">
    <div class="result-title">ドリル完了！</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val" id="res-correct">0</div><div class="stat-lbl">正解数</div></div>
      <div class="stat-box"><div class="stat-val" id="res-pct">0%</div><div class="stat-lbl">正答率</div></div>
      <div class="stat-box"><div class="stat-val" id="res-theta">0.00</div><div class="stat-lbl">最終θ</div></div>
    </div>
    <button class="btn-retry" onclick="goHome()">ホームに戻る</button>
  </div>
</div>

<div class="loading" id="loading" style="display:none">読み込み中...</div>

<script>
const SUPABASE_URL = 'https://hwxreikopltisfoimuzf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IibWbT-1J9MeXGN5XkJfMw_PqsRfgsi';
const DRILL_SIZE = 10;

let currentUser = null;
let questions = [];
let currentIdx = 0;
let answered = false;
let theta = 0.0;
let correctCount = 0;
let totalAnswered = 0;

// ── ユーティリティ ──
function api(path, opts = {}) {
  return fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'block' : 'none';
}

function thetaToPercent(t) {
  return Math.min(100, Math.max(0, ((t + 3) / 6) * 100));
}

function thetaLabel(t) {
  if (t < -1.5) return '基礎から学ぼう';
  if (t < -0.5) return '少しずつ上達中';
  if (t <  0.5) return '平均レベル';
  if (t <  1.5) return 'かなり詳しい';
  return 'エキスパート！';
}

function diffLabel(b) {
  if (b <= -0.5) return 'やさしい';
  if (b <=  0.5) return 'ふつう';
  return 'むずかしい';
}

function updateTheta(th, a, b, correct) {
  const p = 1 / (1 + Math.exp(-1.7 * a * (th - b)));
  const info = 1.7 * 1.7 * a * a * p * (1 - p);
  const delta = correct ? (1 - p) / (info + 0.1) : -p / (info + 0.1);
  return Math.max(-3, Math.min(3, th + delta * 0.8));
}

// ── ログイン ──
async function login() {
  const schoolCode = document.getElementById('school-code').value.trim().toUpperCase();
  const grade      = parseInt(document.getElementById('grade').value);
  const classNum   = parseInt(document.getElementById('class-num').value);
  const studentNum = parseInt(document.getElementById('student-num').value);
  const nickname   = document.getElementById('nickname').value.trim();

  if (!schoolCode || !grade || !classNum || !studentNum || !nickname) {
    showError('すべての項目を入力してください'); return;
  }

  showLoading(true);
  try {
    // 既存ユーザーを検索
    const res = await api(
      `/rest/v1/student_profiles?school_code=eq.${schoolCode}&grade=eq.${grade}&class_num=eq.${classNum}&student_num=eq.${studentNum}&select=*`
    );
    const data = await res.json();

    if (data.length > 0) {
      // 既存ユーザー → そのままログイン
      currentUser = data[0];
      // ニックネームが変わっていたら更新
      if (currentUser.nickname !== nickname) {
        await api(`/rest/v1/student_profiles?id=eq.${currentUser.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ nickname, last_active: new Date().toISOString() })
        });
        currentUser.nickname = nickname;
      }
    } else {
      // 新規ユーザー登録
      const ins = await api('/rest/v1/student_profiles', {
        method: 'POST',
        body: JSON.stringify({ school_code: schoolCode, grade, class_num: classNum, student_num: studentNum, nickname, theta: 0.0 })
      });
      const newData = await ins.json();
      currentUser = Array.isArray(newData) ? newData[0] : newData;
    }

    theta = currentUser.theta || 0.0;
    localStorage.setItem('upoc_user_id', currentUser.id);
    showLoading(false);
    goHome();
  } catch(e) {
    showError('ログインに失敗しました: ' + e.message);
    showLoading(false);
  }
}

function logout() {
  currentUser = null;
  localStorage.removeItem('upoc_user_id');
  document.getElementById('user-info').style.display = 'none';
  showScreen('screen-login');
}

// ── ホーム ──
function goHome() {
  document.getElementById('user-info').style.display = 'flex';
  document.getElementById('user-name-disp').textContent = currentUser.nickname + ' さん';
  document.getElementById('home-theta').textContent = theta.toFixed(2);
  document.getElementById('home-theta-bar').style.width = thetaToPercent(theta) + '%';
  document.getElementById('home-theta-label').textContent = thetaLabel(theta);
  document.getElementById('home-total').textContent = currentUser.total_answered || 0;
  showScreen('screen-home');
}

// ── ドリル ──
async function startDrill() {
  const cat   = document.getElementById('cat-select').value;
  const level = document.getElementById('level-select').value;
  showLoading(true);

  try {
    let url = `/rest/v1/questions?status=eq.active&limit=100&select=id,question_text,choices,correct_index,explanation,law_ref,irt_a,irt_b,category`;
    if (cat !== 'all') url += `&category=eq.${encodeURIComponent(cat)}`;

    const res  = await api(url);
    let data   = await res.json();

    if (level !== 'all') {
      data = data.filter(q =>
        level === 'easy' ? q.irt_b <= -0.5 :
        level === 'mid'  ? q.irt_b > -0.5 && q.irt_b <= 0.5 :
                           q.irt_b > 0.5
      );
    }

    if (data.length === 0) {
      showError('条件に合う問題が見つかりませんでした');
      showLoading(false); return;
    }

    data.sort(() => Math.random() - 0.5);
    questions    = data.slice(0, DRILL_SIZE);
    currentIdx   = 0;
    correctCount = 0;
    totalAnswered= 0;

    showLoading(false);
    showScreen('screen-drill');
    renderQuestion();
  } catch(e) {
    showError('問題の取得に失敗しました');
    showLoading(false);
  }
}

function renderQuestion() {
  const q = questions[currentIdx];
  answered = false;

  const pct = Math.round((currentIdx / questions.length) * 100);
  document.getElementById('progress-text').textContent = `${currentIdx + 1} / ${questions.length}問`;
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent    = `Q${currentIdx + 1}`;
  document.getElementById('cat-badge').textContent  = q.category;
  document.getElementById('diff-badge').textContent = diffLabel(q.irt_b);

  // 問題文・注釈分離
  let qText = q.question_text;
  const noteEl = document.getElementById('q-note');
  const noteMatch = qText.match(/※[^\n]+/);
  if (noteMatch) {
    noteEl.textContent = noteMatch[0];
    noteEl.style.display = 'block';
    qText = qText.replace(noteMatch[0], '').trim();
  } else {
    noteEl.style.display = 'none';
  }
  document.getElementById('q-text').textContent = qText;

  // 選択肢
  const choices = typeof q.choices === 'string' ? JSON.parse(q.choices) : q.choices;
  const labels  = ['ア', 'イ', 'ウ', 'エ'];
  const container = document.getElementById('choices');
  container.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i, q);
    container.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
}

function selectAnswer(idx, q) {
  if (answered) return;
  answered = true;

  const correct = idx === q.correct_index;
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct_index) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  theta = updateTheta(theta, q.irt_a, q.irt_b, correct);
  if (correct) correctCount++;
  totalAnswered++;

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  document.getElementById('fb-title').textContent = correct ? '正解！' : `不正解　正解は「${['ア','イ','ウ','エ'][q.correct_index]}」`;
  document.getElementById('fb-body').textContent  = q.explanation;
  document.getElementById('fb-law').textContent   = q.law_ref ? '📌 ' + q.law_ref : '';

  const btnNext = document.getElementById('btn-next');
  btnNext.style.display  = 'block';
  btnNext.textContent = currentIdx + 1 >= questions.length ? '結果を見る' : '次の問題 →';
}

async function nextQuestion() {
  currentIdx++;
  if (currentIdx >= questions.length) {
    await saveResult();
    showResult();
  } else {
    renderQuestion();
  }
}

async function saveResult() {
  if (!currentUser) return;
  try {
    await api(`/rest/v1/student_profiles?id=eq.${currentUser.id}`, {
      method: 'PATCH',
      body: JSON.stringify({
        theta: parseFloat(theta.toFixed(3)),
        last_active: new Date().toISOString()
      })
    });
    currentUser.theta = theta;
  } catch(e) { console.error('保存失敗', e); }
}

function showResult() {
  const pct = Math.round((correctCount / totalAnswered) * 100);
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-pct').textContent     = pct + '%';
  document.getElementById('res-theta').textContent   = theta.toFixed(2);

  const comment =
    pct >= 80 ? 'すばらしい！自転車ルールをよく理解しています。' :
    pct >= 60 ? 'まずまずです。間違えた問題を復習しましょう。' :
                'もう少し練習が必要です。繰り返し挑戦しましょう。';
  document.getElementById('result-sub').textContent = `正答率 ${pct}%　${comment}`;
  showScreen('screen-result');
}

// ── 起動時：ローカルストレージから復元 ──
(async function init() {
  const savedId = localStorage.getItem('upoc_user_id');
  if (!savedId) return;
  try {
    const res  = await api(`/rest/v1/student_profiles?id=eq.${savedId}&select=*`);
    const data = await res.json();
    if (data.length > 0) {
      currentUser = data[0];
      theta = currentUser.theta || 0.0;
      goHome();
    }
  } catch(e) {}
})();
</script>
