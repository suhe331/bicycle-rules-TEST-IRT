<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U-Poc 問題生成</title>
<style>
:root{
  --bg:#f5f3ee;--surface:#fff;--border:#e2ddd5;--text:#1a1a18;--muted:#7a7870;
  --accent:#2563eb;--accent-light:#eff6ff;
  --correct:#16a34a;--correct-light:#f0fdf4;
  --warn:#854F0B;--warn-light:#FAEEDA;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','BIZ UDPGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 4rem;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:720px;display:flex;flex-direction:column;gap:16px}

.topbar{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.logo em{color:var(--accent);font-style:normal}
.teacher-badge{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--warn-light);color:var(--warn);font-weight:500}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:20px}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* アップロードゾーン */
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:32px;margin-bottom:8px;color:var(--muted)}
.upload-text{font-size:14px;color:var(--muted);line-height:1.6}
.upload-text b{color:var(--text)}
.upload-note{font-size:11px;color:var(--muted);margin-top:4px}

/* プレビュー */
.preview-wrap{display:none;position:relative}
.preview-img{width:100%;border-radius:var(--rs);max-height:320px;object-fit:cover}
.preview-change{position:absolute;top:8px;right:8px;font-size:12px;padding:4px 10px;border-radius:var(--rs);background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer}

/* メタ入力 */
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.fg{flex:1;min-width:140px;display:flex;flex-direction:column;gap:6px}
.fg label{font-size:12px;font-weight:500;color:var(--muted)}
input[type=text],select,textarea{width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);border-color:transparent}
textarea{resize:vertical;line-height:1.6}

/* 生成ボタン */
.btn-generate{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn-generate:hover{background:#1d4ed8}
.btn-generate:disabled{opacity:.5;cursor:default}

/* 生成中 */
.generating{text-align:center;padding:2rem;display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.generating-text{font-size:14px;color:var(--muted)}

/* 生成結果 */
.result-area{display:none;flex-direction:column;gap:12px}
.result-img-wrap{display:flex;gap:12px;align-items:flex-start}
.result-img{width:160px;height:110px;object-fit:cover;border-radius:var(--rs);flex-shrink:0;border:0.5px solid var(--border)}
.result-meta{flex:1}
.result-cat{font-size:11px;padding:2px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-weight:600;display:inline-block;margin-bottom:6px}
.result-q{font-size:15px;font-weight:500;line-height:1.6}

.choices-edit{display:flex;flex-direction:column;gap:6px}
.choice-row{display:flex;align-items:flex-start;gap:8px}
.choice-label{font-size:12px;font-weight:700;min-width:22px;padding-top:9px;color:var(--muted)}
.choice-input{flex:1;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit}
.choice-input.correct-choice{border-color:var(--correct);background:var(--correct-light)}
.correct-mark{font-size:11px;font-weight:700;color:var(--correct);white-space:nowrap;padding-top:9px;flex-shrink:0}

.expl-area{display:flex;flex-direction:column;gap:6px}
.expl-area label{font-size:12px;font-weight:500;color:var(--muted)}

.meta-row{display:flex;gap:10px;flex-wrap:wrap}
.meta-box{flex:1;min-width:120px;background:var(--bg);border-radius:var(--rs);padding:10px 12px}
.meta-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.meta-val{font-size:14px;font-weight:500}

.divider{border:none;border-top:0.5px solid var(--border)}

.btn-row{display:flex;gap:8px}
.btn-secondary{flex:1;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer}
.btn-approve{flex:2;padding:11px;background:var(--correct);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer}
.btn-approve:hover{background:#15803d}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;display:none;z-index:100}

.error-msg{font-size:13px;padding:10px 14px;background:#fef2f2;color:#dc2626;border-radius:var(--rs);display:none}

.location-note{font-size:12px;color:var(--muted);background:var(--warn-light);border-radius:var(--rs);padding:8px 12px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="logo">U<em>-</em>Poc</div>
  <div class="teacher-badge">教員モード</div>
</div>

<div class="error-msg" id="error-msg"></div>

<!-- Step 1: 写真アップロード -->
<div class="card">
  <div class="card-title">
    <div class="step-num">1</div>
    写真をアップロード
  </div>

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" onchange="handleFile(this.files[0])">
    <div class="upload-icon">📷</div>
    <div class="upload-text"><b>タップして写真を選ぶ</b><br>または写真をここにドラッグ</div>
    <div class="upload-note">JPEG / PNG / WebP・最大2MB・自動圧縮されます</div>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <img class="preview-img" id="preview-img" src="" alt="プレビュー">
    <button class="preview-change" onclick="resetUpload()">別の写真に変更</button>
  </div>
</div>

<!-- Step 2: 場所・メモ -->
<div class="card" id="step2" style="display:none">
  <div class="card-title">
    <div class="step-num">2</div>
    場所・メモを入力（任意）
  </div>
  <div class="location-note">📍 場所を入力すると「自分たちの通学路の問題」としてリアリティが増します</div>
  <div style="height:12px"></div>
  <div class="form-row">
    <div class="fg">
      <label>場所・交差点名</label>
      <input type="text" id="location-name" placeholder="例：学校前の交差点、○○踏切">
    </div>
    <div class="fg">
      <label>学校コード</label>
      <input type="text" id="school-code" placeholder="例：CHOFU001" style="text-transform:uppercase">
    </div>
  </div>
  <div style="height:10px"></div>
  <div class="fg">
    <label>AIへの補足メモ（任意）</label>
    <textarea id="memo" rows="2" placeholder="例：ここは見通しが悪く、朝の通学時間帯に自転車と歩行者が集中します"></textarea>
  </div>
</div>

<!-- Step 3: 生成 -->
<div class="card" id="step3" style="display:none">
  <div class="card-title">
    <div class="step-num">3</div>
    AI問題を生成
  </div>

  <div class="generating" id="generating">
    <div class="spinner"></div>
    <div class="generating-text" id="generating-text">写真を解析しています...</div>
  </div>

  <div class="result-area" id="result-area">

    <div class="result-img-wrap">
      <img class="result-img" id="result-img" src="" alt="">
      <div class="result-meta">
        <div class="result-cat" id="result-cat">カテゴリ</div>
        <div class="result-q" id="result-q"></div>
      </div>
    </div>

    <hr class="divider">

    <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px">選択肢（緑が正解・内容は編集可）</div>
    <div class="choices-edit" id="choices-edit"></div>

    <hr class="divider">

    <div class="expl-area">
      <label>解説</label>
      <textarea id="result-expl" rows="3"></textarea>
    </div>
    <div class="fg">
      <label>法令参照</label>
      <input type="text" id="result-law">
    </div>

    <hr class="divider">

    <div class="meta-row">
      <div class="meta-box">
        <div class="meta-lbl">カテゴリ</div>
        <select id="result-cat-select" style="margin-top:4px;font-size:13px;padding:4px 8px">
          <option>走行ルール</option>
          <option>信号機の種類</option>
          <option>道路標識</option>
          <option>危険行為禁止</option>
          <option>走行判断</option>
          <option>事故対応</option>
          <option>安全対策</option>
          <option>青切符・法律</option>
          <option>自転車マナー</option>
          <option>自転車整備・安全</option>
        </select>
      </div>
      <div class="meta-box">
        <div class="meta-lbl">難易度 b値</div>
        <div class="meta-val" id="result-b">0.0</div>
      </div>
      <div class="meta-box">
        <div class="meta-lbl">識別力 a値</div>
        <div class="meta-val" id="result-a">1.0</div>
      </div>
      <div class="meta-box">
        <div class="meta-lbl">対象レベル</div>
        <div class="meta-val" id="result-level">ふつう</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="regenerate()">🔄 再生成</button>
      <button class="btn-approve" onclick="approve()">✓ 承認してDBに登録</button>
    </div>
  </div>

  <button class="btn-generate" id="btn-generate" onclick="generate()">
    <span>✨</span> AIで問題を生成する
  </button>
</div>

</div><!-- /wrap -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://hwxreikopltisfoimuzf.supabase.co';
const SUPABASE_KEY='sb_publishable_IibWbT-1J9MeXGN5XkJfMw_PqsRfgsi';

let compressedBlob=null;
let uploadedUrl=null;
let generatedData=null;

function api(path,opts={}){
  return fetch(SUPABASE_URL+path,{...opts,headers:{
    'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
    'Content-Type':'application/json','Prefer':'return=representation',
    ...(opts.headers||{})
  }});
}

function showError(msg){const el=document.getElementById('error-msg');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',5000)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000)}

// ドラッグ&ドロップ
const zone=document.getElementById('upload-zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover')});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});

async function handleFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  compressedBlob=await compressImage(file,800,0.75);
  const url=URL.createObjectURL(compressedBlob);
  document.getElementById('preview-img').src=url;
  document.getElementById('result-img').src=url;
  document.getElementById('upload-zone').style.display='none';
  document.getElementById('preview-wrap').style.display='block';
  document.getElementById('step2').style.display='block';
  document.getElementById('step3').style.display='block';
}

function resetUpload(){
  compressedBlob=null;uploadedUrl=null;generatedData=null;
  document.getElementById('upload-zone').style.display='block';
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('step2').style.display='none';
  document.getElementById('step3').style.display='none';
  document.getElementById('result-area').style.display='none';
  document.getElementById('btn-generate').style.display='flex';
  document.getElementById('generating').style.display='none';
  document.getElementById('file-input').value='';
}

// 画像圧縮
function compressImage(file,maxWidth,quality){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxWidth/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=img.width*scale;
      canvas.height=img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      canvas.toBlob(blob=>resolve(blob),'image/jpeg',quality);
    };
    img.src=URL.createObjectURL(file);
  });
}

// Supabase Storageにアップロード
async function uploadImage(){
  if(!compressedBlob)return null;
  const fname=`questions/${Date.now()}.jpg`;
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/question-images/${fname}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'image/jpeg'},
    body:compressedBlob
  });
  if(!res.ok)throw new Error('画像のアップロードに失敗しました');
  return `${SUPABASE_URL}/storage/v1/object/public/question-images/${fname}`;
}

// base64変換
function blobToBase64(blob){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result.split(',')[1]);
    r.readAsDataURL(blob);
  });
}

async function generate(){
  if(!compressedBlob){showError('写真を選んでください');return}
  document.getElementById('btn-generate').style.display='none';
  document.getElementById('result-area').style.display='none';
  document.getElementById('generating').style.display='block';

  const location=document.getElementById('location-name').value.trim();
  const memo=document.getElementById('memo').value.trim();
  const texts=['写真を解析しています...','交差点・標識・危険箇所を認識中...','問題文を生成しています...','選択肢と解説を作成中...'];
  let ti=0;
  const timer=setInterval(()=>{
    document.getElementById('generating-text').textContent=texts[Math.min(ti++,texts.length-1)];
  },1800);

  try{
    const base64=await blobToBase64(compressedBlob);
    const locationHint=location?`\n撮影場所：${location}`:'';
    const memoHint=memo?`\n補足情報：${memo}`:'';

    const prompt=`あなたは自転車交通安全教育の専門家です。
この写真を見て、日本の小学生〜高校生向けの自転車ルール学習問題を1問作成してください。${locationHint}${memoHint}

写真から読み取れる交通環境（交差点、標識、信号、歩道、停止線、矢印信号など）を分析し、
その場所に即したリアルな問題を作ってください。

以下のJSON形式のみで回答してください（他のテキスト不要）：
{
  "question_text": "問題文（写真を見て答えてください、という形式で）",
  "choices": ["選択肢ア", "選択肢イ", "選択肢ウ", "選択肢エ"],
  "correct_index": 0,
  "explanation": "解説文（なぜその答えになるかを100字程度で）",
  "law_ref": "関連する法令（道交法第○条など）",
  "category": "カテゴリ名（走行ルール/信号機の種類/道路標識/危険行為禁止/走行判断/事故対応/安全対策/青切符・法律/自転車マナー/自転車整備・安全 のいずれか）",
  "irt_b": 難易度（-1.5〜1.5の数値、小学生向け=-1.0、中学生=0.0、高校生以上=0.8）,
  "irt_a": 識別力（0.8〜2.0の数値、通常は1.0〜1.4）,
  "scene_description": "写真に写っている交通環境の簡単な説明"
}

重要なルール：
- 正解の選択肢が他より長くならないようにする
- 写真の内容に直接関係する問題にする
- 小学生でも読める平易な言葉を使う（難しい用語は※で注釈）`;

    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
          {type:'text',text:prompt}
        ]}]
      })
    });

    const data=await response.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    generatedData=JSON.parse(clean);

    clearInterval(timer);
    renderResult(generatedData);
  }catch(e){
    clearInterval(timer);
    showError('問題の生成に失敗しました: '+e.message);
    document.getElementById('btn-generate').style.display='flex';
    document.getElementById('generating').style.display='none';
  }
}

function renderResult(d){
  document.getElementById('generating').style.display='none';
  document.getElementById('result-area').style.display='flex';
  document.getElementById('btn-generate').style.display='none';

  document.getElementById('result-cat').textContent=d.category;
  document.getElementById('result-q').textContent=d.question_text;

  // 選択肢
  const labels=['ア','イ','ウ','エ'];
  document.getElementById('choices-edit').innerHTML=d.choices.map((c,i)=>`
    <div class="choice-row">
      <div class="choice-label">${labels[i]}</div>
      <input class="choice-input${i===d.correct_index?' correct-choice':''}" id="choice-${i}" value="${c}" oninput="updateChoiceStyle(${i})">
      <input type="radio" class="choice-radio" name="correct" value="${i}" ${i===d.correct_index?'checked':''} onchange="updateCorrect(${i})">
    </div>`).join('');

  document.getElementById('result-expl').value=d.explanation;
  document.getElementById('result-law').value=d.law_ref||'';
  document.getElementById('result-b').textContent=d.irt_b.toFixed(1);
  document.getElementById('result-a').textContent=d.irt_a.toFixed(1);
  document.getElementById('result-level').textContent=d.irt_b<=-0.5?'やさしい':d.irt_b<=0.5?'ふつう':'むずかしい';

  // カテゴリセレクト
  const sel=document.getElementById('result-cat-select');
  for(let o of sel.options){if(o.value===d.category)o.selected=true;}
}



function regenerate(){
  document.getElementById('result-area').style.display='none';
  document.getElementById('btn-generate').style.display='flex';
}

async function approve(){
  if(!generatedData){return}
  try{
    // 1. 画像をアップロード
    showToast('画像をアップロード中...');
    uploadedUrl=await uploadImage();

    // 2. 選択肢・正解を取得
    const choices=Array.from({length:4},(_,i)=>document.getElementById(`choice-${i}`)?.value||'').filter(Boolean);
    const correctIndex=parseInt(document.getElementById('choices-edit').dataset.correct||'0');
    const expl=document.getElementById('result-expl').value;
    const law=document.getElementById('result-law').value;
    const cat=document.getElementById('result-cat-select').value;
    const locationTag=document.getElementById('location-name').value.trim()||null;
    const schoolCode=document.getElementById('school-code').value.trim().toUpperCase()||null;

    // 3. questionsに登録
    const payload={
      question_text:generatedData.question_text,
      choices:JSON.stringify(choices),
      correct_index:correctIndex,
      explanation:expl,
      law_ref:law,
      category:cat,
      irt_a:generatedData.irt_a,
      irt_b:generatedData.irt_b,
      photo_url:uploadedUrl,
      location_tag:locationTag,
      school_code:schoolCode,
      sample_count:0,
      status:'active',
      tags:JSON.stringify([cat,'写真問題',locationTag].filter(Boolean)),
      law_version:'2024'
    };

    const res=await api('/rest/v1/questions',{method:'POST',body:JSON.stringify(payload)});
    if(!res.ok)throw new Error(await res.text());

    showToast('✓ 問題をDBに登録しました！');
    setTimeout(()=>resetUpload(),2000);
  }catch(e){
    showError('登録に失敗しました: '+e.message);
  }
}
</script>
</body>
</html>
